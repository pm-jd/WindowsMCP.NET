name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore
      run: dotnet restore WindowsMCP.NET.slnx

    - name: Build
      run: dotnet build WindowsMCP.NET.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test WindowsMCP.NET.slnx --configuration Release --no-build --filter "Category!=Integration"

    - name: Test (Parity - dotnet only)
      run: dotnet test tests/WindowsMCP.NET.ParityTests/ --configuration Release --filter "Category!=Schema&Category!=Desktop"
      env:
        PARITY_SERVER: dotnet

    - name: Publish (AOT)
      run: dotnet publish src/WindowsMCP.NET/WindowsMCP.NET.csproj -c Release -r win-x64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WindowsMCP.NET
        path: src/WindowsMCP.NET/bin/Release/net9.0-windows/win-x64/publish/
